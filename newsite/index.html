  var SS_KEY="sa_staging_pw";
  function b2u(b64){var bin=atob(b64),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
  async function decrypt(pw){
    var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);

    try{
      var html=await decrypt(pw);
      if(remember){try{sessionStorage.setItem(SS_KEY,pw);}catch(e){}}

      var go=document.getElementById("go");if(go)go.disabled=false;
      var pwi=document.getElementById("pw");if(pwi){pwi.focus();pwi.select();}

  document.getElementById("f").addEventListener("submit",function(ev){

    document.getElementById("err").classList.remove("show");
    document.getElementById("go").disabled=true;
